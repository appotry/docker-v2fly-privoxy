name: Build Docker Image

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  IMAGE: bloodstar/v2fly-privoxy

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read v2fly-core version from Dockerfile
        id: version
        run: |
          VERSION=$(grep -oP '(?<=^FROM v2fly/v2fly-core:)\S+' Dockerfile)
          echo "core_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Target version: $VERSION"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm/v7,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.core_version }}
            ${{ env.IMAGE }}:latest

      - name: Write version info
        run: |
          echo "BUILT_VERSION=${{ steps.version.outputs.core_version }}" >> "$GITHUB_STEP_SUMMARY"
