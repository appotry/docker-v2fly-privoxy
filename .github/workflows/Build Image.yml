name: Build Docker Image

on:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  IMAGE: bloodstar/v2fly-privoxy
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get latest v2fly-core version
        id: version
        run: |
          RESP=$(curl -s "https://hub.docker.com/v2/repositories/v2fly/v2fly-core/tags?page_size=100")
          LATEST=$(echo "$RESP" | python3 -c "
import json,sys
data = json.load(sys.stdin)
tags = [r['name'] for r in data.get('results', []) if r['name'] != 'latest']
semver = sorted([t for t in tags if t.lstrip('v').replace('.','').isdigit()],
  key=lambda x: [int(p) for p in x.lstrip('v').split('.')])
print(semver[-1] if semver else '')
")
          echo "core_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Detected v2fly-core: $LATEST"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          file: ./Dockerfile
          platforms: linux/amd64,linux/386,linux/arm/v6,linux/arm/v7,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.core_version }}
            ${{ env.IMAGE }}:latest

      - name: Write version info
        run: |
          echo "BUILT_VERSION=${{ steps.version.outputs.core_version }}" >> "$GITHUB_STEP_SUMMARY"
