name: Build Docker Image

on:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  IMAGE: bloodstar/v2fly-privoxy
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get latest v2fly-core version
        id: version
        run: |
          RESP=$(curl -s "https://hub.docker.com/v2/repositories/v2fly/v2fly-core/tags?page_size=100")
          LATEST=$(echo "$RESP" | python3 -c "import json,sys;d=json.load(sys.stdin);t=[r['name'] for r in d['results'] if r['name']!='latest'];s=sorted([x for x in t if x.lstrip('v').replace('.','').isdigit()],key=lambda v:[int(p) for p in v.lstrip('v').split('.')]);print(s[-1] if s else '')")
          DATE=$(date +'%Y-%m-%d')
          echo "core_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "build_date=$DATE" >> "$GITHUB_OUTPUT"
          echo "Detected v2fly-core: $LATEST"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          file: ./Dockerfile
          platforms: linux/amd64,linux/386,linux/arm/v6,linux/arm/v7,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.core_version }}-${{ steps.version.outputs.build_date }}
            ${{ env.IMAGE }}:latest

      - name: Write version info
        run: |
          echo "BUILT_TAG=${{ steps.version.outputs.core_version }}-${{ steps.version.outputs.build_date }}" >> "$GITHUB_STEP_SUMMARY"
